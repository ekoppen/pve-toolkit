#cloud-config

# ============================================
# MINIO CLOUD-INIT CONFIG
# S3-compatible object storage met Docker
#
# Credentials worden on-VM gegenereerd (veilig!)
# Console: http://<IP>:9001
# API:     http://<IP>:9000
# ============================================

package_update: true
package_upgrade: true

packages:
  - qemu-guest-agent
  - net-tools
  - curl
  - wget
  - vim
  - sudo
  - openssh-server
  - htop
  - unattended-upgrades
  - ca-certificates
  - gnupg
  - lsb-release

ssh_pwauth: false

users:
  - name: admin
    groups: sudo, adm, docker
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    lock_passwd: true
    ssh_authorized_keys:
      - YOUR_SSH_PUBLIC_KEY_HERE

write_files:
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "storage-driver": "overlay2"
      }
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

runcmd:
  # Basis services
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - systemctl enable ssh
  - systemctl start ssh

  # Deploy key → root (configured by setup.sh)
  - |
    DKEY="DEPLOY_SSH_PUBLIC_KEY_HERE"
    if [ "$DKEY" != "DEPLOY_SSH_PUBLIC_KEY_HERE" ]; then
      mkdir -p /root/.ssh && chmod 700 /root/.ssh
      echo "$DKEY" >> /root/.ssh/authorized_keys
      chmod 600 /root/.ssh/authorized_keys
    fi

  # Docker installatie via officieel script
  - curl -fsSL https://get.docker.com | sh
  - apt-get install -y docker-compose-plugin
  - usermod -aG docker admin

  # MinIO directories aanmaken
  - mkdir -p /opt/minio/data
  - mkdir -p /opt/minio/config

  # MinIO credentials genereren (alleen als ze nog niet bestaan)
  - |
    if [ ! -f /opt/minio/config/.env ]; then
      MINIO_ROOT_USER="admin"
      MINIO_ROOT_PASSWORD=$(openssl rand -base64 24 | tr -d '/+\n' | head -c 24)
      echo "MINIO_ROOT_USER=${MINIO_ROOT_USER}" > /opt/minio/config/.env
      echo "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}" >> /opt/minio/config/.env
    fi

  # MinIO starten als Docker container (alleen als deze nog niet draait)
  - |
    if ! docker ps -q --filter name=^minio$ | grep -q .; then
      source /opt/minio/config/.env
      docker run -d \
        --name minio \
        --restart=always \
        -p 9000:9000 \
        -p 9001:9001 \
        -e "MINIO_ROOT_USER=${MINIO_ROOT_USER}" \
        -e "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}" \
        -v /opt/minio/data:/data \
        minio/minio:latest server /data --console-address ":9001"
    fi

  # Docker directories voor admin user
  - mkdir -p /opt/docker/compose /opt/docker/data
  - chown -R admin:admin /opt/docker

  # Docker prune cronjob
  - echo "0 3 * * 0 root docker image prune -af 2>&1 | logger -t docker-prune" > /etc/cron.d/docker-prune

  # Credentials veilig opslaan (alleen root kan lezen)
  - |
    IP=$(hostname -I | awk '{print $1}')
    MINIO_PASS=$(grep '^MINIO_ROOT_PASSWORD=' /opt/minio/config/.env | cut -d= -f2)
    cat > /root/.credentials << CEOF
    === MinIO ===
    Console:    http://${IP}:9001
    API:        http://${IP}:9000
    Login:      admin / ${MINIO_PASS}
    Config:     /opt/minio/config/.env
    CEOF
    chmod 600 /root/.credentials
    echo "" >> /etc/motd
    echo "=== MinIO ===" >> /etc/motd
    echo "Console:    http://${IP}:9001" >> /etc/motd
    echo "API:        http://${IP}:9000" >> /etc/motd
    echo "Credentials: cat /root/.credentials" >> /etc/motd
    echo "" >> /etc/motd

final_message: "MinIO setup voltooid na $UPTIME seconden - Console op http://<IP>:9001, API op http://<IP>:9000"
